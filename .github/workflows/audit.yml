name: audit
on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # rustscenic-py is a pyo3 cdylib — linking requires maturin's Python
      # link flags (undefined dynamic_lookup on macOS). It's built separately
      # in the python job via maturin, so exclude it from the raw cargo build.
      - run: cargo build --release --workspace --exclude rustscenic-py
      - run: cargo clippy --workspace --exclude rustscenic-py --all-targets -- -D warnings
      - run: cargo test --workspace --exclude rustscenic-py --release
      - name: cargo-audit (Rust supply chain)
        # Only run once per matrix (ubuntu), not for every OS
        if: matrix.os == 'ubuntu-24.04'
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  python:
    runs-on: ${{ matrix.os }}
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pip install maturin numpy pandas pyarrow scipy scanpy anndata certifi pytest
      - run: maturin build --release --manifest-path crates/rustscenic-py/Cargo.toml
      - run: pip install target/wheels/rustscenic-*.whl --force-reinstall --no-deps
      # Smoke test the full API surface
      - run: |
          python -c "
          import rustscenic
          assert rustscenic.__version__ == '0.1.0'
          for stage in ['grn', 'aucell', 'topics', 'cistarget']:
              mod = getattr(rustscenic, stage)
              print(f'{stage}: OK')
          "
      # Python unit test suite
      - run: pytest tests/ -v
      # End-to-end quickstart runs and produces output
      - run: python -m rustscenic.quickstart
      # Full 4-stage example on real PBMC-3k (downloads 10x tarball)
      - run: pip install scanpy igraph leidenalg
      - run: python examples/pbmc3k_end_to_end.py
      # Validation baselines committed to repo match our tool
      - run: |
          python validation/compare.py --stage grn \
            --ours validation/baselines/pbmc3k_grn.parquet \
            --reference validation/baselines/pbmc3k_grn.parquet
