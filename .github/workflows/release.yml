name: release

# Fires when a semver tag is pushed (e.g. v0.1.0).
# Builds wheels for Linux x86_64/aarch64 + macOS x86_64/aarch64, sdist,
# then uploads everything to the GitHub Release. PyPI trusted publishing is
# optional until the PyPI project is configured with this workflow's claims.
#
# Setup: in PyPI project Settings → Publishing, add a "Trusted Publisher" for
# this repo/workflow. No API token is stored in GitHub secrets.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels-linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: '2_17'
          args: --release --manifest-path crates/rustscenic-py/Cargo.toml
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: target/wheels/*.whl

  wheels-macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --manifest-path crates/rustscenic-py/Cargo.toml
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: target/wheels/*.whl

  sdist:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path crates/rustscenic-py/Cargo.toml
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: target/wheels/*.tar.gz

  github-release:
    needs: [wheels-linux, wheels-macos, sdist]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    needs: [github-release]
    runs-on: ubuntu-24.04
    # Enable after configuring PyPI trusted publishing for this repo/workflow
    # and setting the repo variable PYPI_TRUSTED_PUBLISHING=true.
    if: startsWith(github.ref, 'refs/tags/v') && vars.PYPI_TRUSTED_PUBLISHING == 'true'
    permissions:
      id-token: write   # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
